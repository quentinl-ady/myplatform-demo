app.frontend.url=${APP_FRONTEND_URL:http://localhost:4200}
app.backend.url=${APP_BACKEND_URL:http://localhost:8080}

spring.datasource.url=${DATABASE_URL:jdbc:sqlite:users.db}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.sqlite.JDBC}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.community.dialect.SQLiteDialect}
adyen.balancePlatformApiKey=${ADYEN_BALANCE_PLATFORM_API_KEY:}
adyen.lemApiKey=${ADYEN_LEM_API_KEY:}
adyen.pspApiKey=${ADYEN_PSP_API_KEY:}
adyen.merchantAccount=${ADYEN_MERCHANT_ACCOUNT:}
adyen.clientKey=${ADYEN_CLIENT_KEY:}
adyen.lemVersion=${ADYEN_LEM_VERSION:v4}
adyen.issuing.country=${ADYEN_ISSUING_COUNTRY:}
adyen.issuing.visa.subvariant=${ADYEN_ISSUING_VISA_SUBVARIANT:}
adyen.issuing.mastercard.subvariant=${ADYEN_ISSUING_MASTERCARD_SUBVARIANT:}
